<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgQM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgQM)"/>
  <circle cx="55" cy="45" r="25" fill="#0d9488" opacity="0.04"/>
  <circle cx="345" cy="195" r="35" fill="#0d9488" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#0d9488" opacity="0.08"/>
  <circle cx="200" cy="95" r="48" fill="#0d9488" opacity="0.10"/>
  <circle cx="200" cy="95" r="34" fill="#0d9488" opacity="0.08"/>
  <!-- Brain icon -->
  <g transform="translate(200,92)" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain left -->
    <path d="M-2 -22 C-12 -22 -20 -16 -20 -8 C-24 -6 -26 0 -24 6 C-26 10 -24 16 -18 18 C-16 22 -10 24 -4 22 C-2 24 0 22 0 20"/>
    <!-- Brain right -->
    <path d="M2 -22 C12 -22 20 -16 20 -8 C24 -6 26 0 24 6 C26 10 24 16 18 18 C16 22 10 24 4 22 C2 24 0 22 0 20"/>
    <!-- Brain center line -->
    <line x1="0" y1="-22" x2="0" y2="20" stroke-width="1.5" opacity="0.4"/>
    <!-- Brain folds left -->
    <path d="M-16 -4 C-10 -2 -6 2 -2 0" stroke-width="1.5" opacity="0.4"/>
    <path d="M-18 8 C-12 6 -6 10 -2 8" stroke-width="1.5" opacity="0.4"/>
    <!-- Brain folds right -->
    <path d="M16 -4 C10 -2 6 2 2 0" stroke-width="1.5" opacity="0.4"/>
    <path d="M18 8 C12 6 6 10 2 8" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Sparkle/memory particles -->
  <g fill="#0d9488">
    <circle cx="160" cy="68" r="3" opacity="0.25">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="72" r="2.5" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="118" r="2" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="115" r="2.5" opacity="0.25">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Star sparkles -->
    <path d="M152 85 L154 82 L156 85 L154 88Z" opacity="0.3"/>
    <path d="M248 90 L250 87 L252 90 L250 93Z" opacity="0.25"/>
    <path d="M170 55 L171 53 L172 55 L171 57Z" opacity="0.2"/>
    <path d="M230 130 L231 128 L232 130 L231 132Z" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#134e4a">Quran Memorization</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0d9488">Hifz Program</text>
</svg>
