<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgQA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgQA)"/>
  <circle cx="55" cy="42" r="22" fill="#0d9488" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#0d9488" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#0d9488" opacity="0.08"/>
  <circle cx="200" cy="95" r="48" fill="#0d9488" opacity="0.10"/>
  <circle cx="200" cy="95" r="34" fill="#0d9488" opacity="0.08"/>
  <!-- Ornamental frame -->
  <g transform="translate(200,88)" fill="none" stroke="#0d9488" stroke-linecap="round" stroke-linejoin="round">
    <!-- Octagonal frame -->
    <path d="M-12 -28 L12 -28 L28 -12 L28 12 L12 28 L-12 28 L-28 12 L-28 -12Z" stroke-width="2" opacity="0.4"/>
    <!-- Inner decoration -->
    <path d="M-8 -20 L8 -20 L20 -8 L20 8 L8 20 L-8 20 L-20 8 L-20 -8Z" stroke-width="1.5" opacity="0.25"/>
    <!-- Arabic Quran text -->
    <text x="0" y="4" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#0d9488" font-weight="bold" opacity="0.75">قرآن</text>
    <!-- Corner dots -->
    <circle cx="0" cy="-24" r="2" fill="#0d9488" opacity="0.3"/>
    <circle cx="0" cy="24" r="2" fill="#0d9488" opacity="0.3"/>
    <circle cx="-24" cy="0" r="2" fill="#0d9488" opacity="0.3"/>
    <circle cx="24" cy="0" r="2" fill="#0d9488" opacity="0.3"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#0d9488">
    <circle cx="148" cy="65" r="2" opacity="0.2"/>
    <circle cx="252" cy="70" r="1.5" opacity="0.15"/>
    <circle cx="155" cy="122" r="1.5" opacity="0.15"/>
    <circle cx="248" cy="118" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#134e4a">Quranic Arabic</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0d9488">Course</text>
</svg>
