<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgQT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="100%" style="stop-color:#fecaca"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgQT)"/>
  <circle cx="55" cy="42" r="22" fill="#dc2626" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#dc2626" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#dc2626" opacity="0.06"/>
  <circle cx="200" cy="95" r="48" fill="#dc2626" opacity="0.08"/>
  <circle cx="200" cy="95" r="34" fill="#dc2626" opacity="0.06"/>
  <!-- Two books with translation arrows -->
  <g transform="translate(200,92)" fill="none" stroke="#dc2626" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left book (Arabic) -->
    <rect x="-34" y="-20" width="26" height="36" rx="3" stroke-width="2.5" fill="white" opacity="0.4"/>
    <line x1="-30" y1="-10" x2="-14" y2="-10" stroke-width="1.5" opacity="0.4"/>
    <line x1="-30" y1="-3" x2="-14" y2="-3" stroke-width="1.5" opacity="0.35"/>
    <line x1="-30" y1="4" x2="-18" y2="4" stroke-width="1.5" opacity="0.3"/>
    <!-- Book spine -->
    <line x1="-34" y1="-17" x2="-34" y2="13" stroke-width="3" opacity="0.3"/>
    <!-- Right book (Translation) -->
    <rect x="8" y="-20" width="26" height="36" rx="3" stroke-width="2.5" fill="white" opacity="0.4"/>
    <line x1="12" y1="-10" x2="28" y2="-10" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="-3" x2="28" y2="-3" stroke-width="1.5" opacity="0.35"/>
    <line x1="12" y1="4" x2="22" y2="4" stroke-width="1.5" opacity="0.3"/>
    <!-- Book spine -->
    <line x1="34" y1="-17" x2="34" y2="13" stroke-width="3" opacity="0.3"/>
    <!-- Translation arrows between books -->
    <path d="M-6 -6 L4 -6" stroke-width="2" opacity="0.6"/>
    <path d="M2 -9 L5 -6 L2 -3" stroke-width="2" opacity="0.6"/>
    <path d="M4 2 L-6 2" stroke-width="2" opacity="0.6"/>
    <path d="M-4 -1 L-7 2 L-4 5" stroke-width="2" opacity="0.6"/>
    <!-- Language labels -->
    <text x="-21" y="-14" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#dc2626" font-weight="bold" opacity="0.6">عربی</text>
    <text x="21" y="-14" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#dc2626" font-weight="bold" opacity="0.6">ENG</text>
  </g>
  <g fill="#dc2626">
    <circle cx="150" cy="68" r="1.5" opacity="0.15"/>
    <circle cx="250" cy="72" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">Quran Translation</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">Course</text>
</svg>
