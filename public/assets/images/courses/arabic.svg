<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgAR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgAR)"/>
  <circle cx="60" cy="45" r="25" fill="#2563eb" opacity="0.04"/>
  <circle cx="340" cy="195" r="35" fill="#2563eb" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#2563eb" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#2563eb" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#2563eb" opacity="0.07"/>
  <!-- Calligraphy pen nib -->
  <g transform="translate(185,100) rotate(-35)" fill="none" stroke="#2563eb" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pen body -->
    <rect x="-4" y="-40" width="8" height="32" rx="2" stroke-width="2" fill="#2563eb" opacity="0.1"/>
    <!-- Pen nib -->
    <path d="M-4 -8 L0 2 L4 -8" stroke-width="2" fill="#2563eb" opacity="0.15"/>
    <!-- Pen tip -->
    <circle cx="0" cy="2" r="1" fill="#2563eb" opacity="0.5"/>
    <!-- Pen grip rings -->
    <line x1="-4" y1="-14" x2="4" y2="-14" stroke-width="1.5" opacity="0.3"/>
    <line x1="-4" y1="-18" x2="4" y2="-18" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Arabic calligraphy strokes -->
  <g transform="translate(200,90)" fill="none" stroke="#2563eb" stroke-linecap="round" stroke-linejoin="round">
    <text x="8" y="6" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#2563eb" font-weight="bold" opacity="0.7">ع</text>
    <!-- Flowing ink trail -->
    <path d="M20 10 C28 12 32 8 38 12" stroke-width="2" opacity="0.3"/>
    <path d="M38 12 C42 14 44 10 48 12" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Ink drops -->
  <g fill="#2563eb">
    <circle cx="248" cy="105" r="2" opacity="0.15"/>
    <circle cx="255" cy="100" r="1.5" opacity="0.1"/>
    <circle cx="150" cy="72" r="2" opacity="0.2"/>
    <circle cx="250" cy="75" r="1.5" opacity="0.15"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1e3a5f">Learn Arabic</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">Online</text>
</svg>
