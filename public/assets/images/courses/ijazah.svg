<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgIJ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgIJ)"/>
  <circle cx="55" cy="42" r="22" fill="#ca8a04" opacity="0.05"/>
  <circle cx="345" cy="198" r="30" fill="#ca8a04" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#ca8a04" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#ca8a04" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#ca8a04" opacity="0.07"/>
  <!-- Certificate / Scroll -->
  <g transform="translate(200,90)" fill="none" stroke="#ca8a04" stroke-linecap="round" stroke-linejoin="round">
    <!-- Certificate body -->
    <rect x="-26" y="-24" width="52" height="40" rx="3" stroke-width="2.5" fill="white" opacity="0.5"/>
    <!-- Decorative border -->
    <rect x="-22" y="-20" width="44" height="32" rx="2" stroke-width="1" stroke-dasharray="2 2" opacity="0.3"/>
    <!-- Seal/stamp circle -->
    <circle cx="0" cy="-6" r="10" stroke-width="2" fill="#ca8a04" opacity="0.12"/>
    <!-- Star inside seal -->
    <path d="M0 -12 L2 -8 L6 -8 L3 -5 L4 -1 L0 -3 L-4 -1 L-3 -5 L-6 -8 L-2 -8Z" fill="#ca8a04" opacity="0.3"/>
    <!-- Text lines on certificate -->
    <line x1="-14" y1="8" x2="14" y2="8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-10" y1="12" x2="10" y2="12" stroke-width="1.5" opacity="0.3"/>
    <!-- Ribbon -->
    <path d="M-8 16 L-12 28 L-6 24 L0 28 L6 24 L12 28 L8 16" stroke-width="2" fill="#ca8a04" opacity="0.15"/>
    <line x1="-6" y1="24" x2="-8" y2="18" stroke-width="1" opacity="0.2"/>
    <line x1="6" y1="24" x2="8" y2="18" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Sparkles -->
  <g fill="#ca8a04">
    <path d="M155 65 L157 61 L159 65 L157 69Z" opacity="0.25"/>
    <path d="M245 70 L247 66 L249 70 L247 74Z" opacity="0.2"/>
    <circle cx="150" cy="120" r="1.5" opacity="0.15"/>
    <circle cx="250" cy="115" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#713f12">Online Ijazah</text>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ca8a04">Certification</text>
</svg>
