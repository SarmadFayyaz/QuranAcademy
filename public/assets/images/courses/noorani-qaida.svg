<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgNQ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgNQ)"/>
  <circle cx="50" cy="50" r="25" fill="#0d9488" opacity="0.04"/>
  <circle cx="350" cy="190" r="30" fill="#0d9488" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#0d9488" opacity="0.08"/>
  <circle cx="200" cy="95" r="48" fill="#0d9488" opacity="0.10"/>
  <!-- Slate/board -->
  <g transform="translate(200,90)" fill="none" stroke="#0d9488" stroke-linecap="round" stroke-linejoin="round">
    <!-- Board frame -->
    <rect x="-32" y="-28" width="64" height="52" rx="4" stroke-width="2.5" fill="white" opacity="0.4"/>
    <rect x="-28" y="-24" width="56" height="44" rx="2" stroke-width="1.5" opacity="0.5"/>
    <!-- Arabic letters on board -->
    <text x="-16" y="-6" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#0d9488" font-weight="700" opacity="0.8">ا</text>
    <text x="4" y="-6" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#0d9488" font-weight="700" opacity="0.7">ب</text>
    <text x="20" y="-6" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#0d9488" font-weight="700" opacity="0.6">ت</text>
    <!-- Dotted underline -->
    <line x1="-22" y1="4" x2="24" y2="4" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
    <!-- Second row hint -->
    <text x="-16" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#0d9488" font-weight="600" opacity="0.4">ث</text>
    <text x="4" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#0d9488" font-weight="600" opacity="0.35">ج</text>
    <!-- Pointer/stick -->
    <line x1="28" y1="30" x2="10" y2="0" stroke-width="2" opacity="0.4"/>
    <circle cx="10" cy="0" r="2" fill="#0d9488" opacity="0.3"/>
  </g>
  <!-- Sparkles -->
  <g fill="#0d9488">
    <circle cx="148" cy="65" r="2" opacity="0.2"/>
    <circle cx="252" cy="70" r="1.5" opacity="0.2"/>
    <circle cx="155" cy="125" r="1.5" opacity="0.15"/>
    <circle cx="245" cy="120" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#134e4a">Noorani Qaida</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0d9488">Learn Online</text>
</svg>
