<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgEN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgEN)"/>
  <circle cx="55" cy="42" r="22" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#8b5cf6" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#8b5cf6" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#8b5cf6" opacity="0.07"/>
  <!-- Speech bubble with ABC -->
  <g transform="translate(200,85)" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Speech bubble -->
    <path d="M-30 -20 L30 -20 C34 -20 36 -18 36 -14 L36 10 C36 14 34 16 30 16 L6 16 L0 24 L-6 16 L-30 16 C-34 16 -36 14 -36 10 L-36 -14 C-36 -18 -34 -20 -30 -20Z" stroke-width="2.5" fill="white" opacity="0.4"/>
    <!-- ABC Letters -->
    <text x="-18" y="4" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#8b5cf6" opacity="0.7">A</text>
    <text x="0" y="4" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#8b5cf6" opacity="0.55">B</text>
    <text x="16" y="4" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#8b5cf6" opacity="0.7">C</text>
  </g>
  <!-- Pen icon -->
  <g transform="translate(240,75) rotate(30)" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" stroke-linecap="round">
    <rect x="-2" y="-18" width="4" height="16" rx="1"/>
    <path d="M-2 -2 L0 4 L2 -2"/>
  </g>
  <!-- Book accent -->
  <g transform="translate(158,105)" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2" stroke-linecap="round">
    <path d="M0 0 L0 -14 L16 -14 L16 0Z"/>
    <line x1="3" y1="-10" x2="13" y2="-10"/>
    <line x1="3" y1="-6" x2="10" y2="-6"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#8b5cf6">
    <circle cx="150" cy="65" r="2" opacity="0.2"/>
    <circle cx="250" cy="68" r="1.5" opacity="0.15"/>
    <circle cx="148" cy="128" r="1.5" opacity="0.15"/>
    <circle cx="252" cy="125" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#3b1f6e">English</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6">Reading, Writing &amp; Speaking</text>
</svg>
