<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgUR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgUR)"/>
  <circle cx="55" cy="42" r="22" fill="#f97316" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#f97316" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#f97316" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#f97316" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#f97316" opacity="0.07"/>
  <!-- Nastaliq calligraphy pen / inkwell -->
  <g transform="translate(200,88)" fill="none" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">
    <!-- Writing board / paper -->
    <rect x="-30" y="-22" width="60" height="44" rx="4" stroke-width="2" fill="white" opacity="0.35"/>
    <!-- Urdu calligraphy strokes (Nastaliq style) -->
    <path d="M-18 -6 C-14 -14 -6 -14 -2 -6 C2 2 10 2 14 -6" stroke-width="2.5" opacity="0.7"/>
    <path d="M-14 8 C-10 0 -2 0 2 8 C6 16 14 16 18 8" stroke-width="2.5" opacity="0.55"/>
    <!-- Dots (characteristic of Urdu/Arabic script) -->
    <circle cx="-8" cy="-18" r="2.5" fill="#f97316" opacity="0.5"/>
    <circle cx="6" cy="20" r="2.5" fill="#f97316" opacity="0.45"/>
    <circle cx="12" cy="22" r="2.5" fill="#f97316" opacity="0.4"/>
    <!-- Pen nib accent -->
    <g transform="translate(26,-14) rotate(45)">
      <rect x="-2" y="-12" width="4" height="14" rx="1" stroke-width="1.5" opacity="0.35"/>
      <path d="M-2 2 L0 6 L2 2" stroke-width="1.5" opacity="0.35"/>
    </g>
  </g>
  <!-- Ink drop accents -->
  <g fill="#f97316">
    <circle cx="152" cy="68" r="2" opacity="0.2"/>
    <circle cx="248" cy="72" r="1.5" opacity="0.15"/>
    <circle cx="155" cy="122" r="1.5" opacity="0.15"/>
    <circle cx="245" cy="118" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#7c2d12">Urdu</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f97316">Reading &amp; Writing</text>
</svg>
