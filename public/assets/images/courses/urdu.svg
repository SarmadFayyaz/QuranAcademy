<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="200" cy="100" r="55" fill="#f97316" opacity="0.1"/>
  <circle cx="200" cy="100" r="40" fill="#f97316" opacity="0.15"/>
  <!-- Urdu-style calligraphy strokes -->
  <g transform="translate(200,95)" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round">
    <path d="M-18 -8 C-14 -16 -6 -16 -2 -8 C2 0 10 0 14 -8" opacity="0.8"/>
    <path d="M-14 4 C-10 -4 -2 -4 2 4 C6 12 14 12 18 4" opacity="0.6"/>
    <!-- Dots (common in Urdu script) -->
    <circle cx="-8" cy="-20" r="2" fill="#f97316" opacity="0.5"/>
    <circle cx="6" cy="16" r="2" fill="#f97316" opacity="0.5"/>
    <circle cx="12" cy="18" r="2" fill="#f97316" opacity="0.5"/>
  </g>
  <!-- Book base -->
  <g transform="translate(200,95)" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.3">
    <rect x="-25" y="-25" width="50" height="50" rx="6"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#7c2d12">Urdu Language</text>
  <text x="200" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f97316">Reading &amp; Writing</text>
</svg>