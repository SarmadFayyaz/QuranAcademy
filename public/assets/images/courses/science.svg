<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgSC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgSC)"/>
  <circle cx="55" cy="42" r="22" fill="#059669" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#059669" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#059669" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#059669" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#059669" opacity="0.07"/>
  <!-- Flask / Beaker -->
  <g transform="translate(200,90)" fill="none" stroke="#059669" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flask body -->
    <path d="M-8 -28 L-8 -10 C-8 -10 -22 4 -22 16 C-22 26 -12 30 0 30 C12 30 22 26 22 16 C22 4 8 -10 8 -10 L8 -28" stroke-width="2.5"/>
    <!-- Flask top rim -->
    <line x1="-12" y1="-28" x2="12" y2="-28" stroke-width="2.5"/>
    <!-- Liquid level -->
    <path d="M-18 12 C-14 8 -6 14 0 10 C6 6 14 12 18 8" stroke-width="1.5" opacity="0.4"/>
    <!-- Liquid fill -->
    <path d="M-18 12 C-14 8 -6 14 0 10 C6 6 14 12 18 8 L20 16 C20 26 12 30 0 30 C-12 30 -20 26 -20 16Z" fill="#059669" opacity="0.1" stroke="none"/>
    <!-- Bubbles -->
    <circle cx="-6" cy="18" r="3" opacity="0.3"/>
    <circle cx="6" cy="22" r="2" opacity="0.25"/>
    <circle cx="-2" cy="14" r="1.5" opacity="0.2"/>
  </g>
  <!-- Atom symbol -->
  <g transform="translate(232,72)" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.35">
    <ellipse cx="0" cy="0" rx="14" ry="5"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="14" ry="5" transform="rotate(-60)"/>
    <circle cx="0" cy="0" r="2.5" fill="#059669" opacity="0.4"/>
  </g>
  <!-- Sparkles -->
  <g fill="#059669">
    <circle cx="152" cy="65" r="2" opacity="0.2"/>
    <circle cx="160" cy="125" r="1.5" opacity="0.15"/>
    <path d="M258 118 L260 114 L262 118 L260 122Z" opacity="0.2"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#064e3b">Science</text>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#059669">Tutoring</text>
