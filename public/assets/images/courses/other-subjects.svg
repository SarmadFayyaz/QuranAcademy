<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgOS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgOS)"/>
  <circle cx="55" cy="42" r="22" fill="#ca8a04" opacity="0.05"/>
  <circle cx="345" cy="198" r="30" fill="#ca8a04" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#ca8a04" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#ca8a04" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#ca8a04" opacity="0.07"/>
  <!-- Stack of books with globe -->
  <g transform="translate(200,95)" fill="none" stroke="#ca8a04" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom book (wider) -->
    <rect x="-24" y="8" width="48" height="10" rx="2" stroke-width="2" fill="#ca8a04" opacity="0.12"/>
    <line x1="-24" y1="12" x2="-20" y2="12" stroke-width="2" opacity="0.3"/>
    <!-- Middle book -->
    <rect x="-20" y="-2" width="40" height="10" rx="2" stroke-width="2" fill="#ca8a04" opacity="0.1"/>
    <line x1="-20" y1="2" x2="-16" y2="2" stroke-width="2" opacity="0.25"/>
    <!-- Top book -->
    <rect x="-16" y="-12" width="32" height="10" rx="2" stroke-width="2" fill="#ca8a04" opacity="0.08"/>
    <line x1="-16" y1="-8" x2="-12" y2="-8" stroke-width="2" opacity="0.2"/>
    <!-- Globe on top -->
    <circle cx="0" cy="-24" r="12" stroke-width="2"/>
    <ellipse cx="0" cy="-24" rx="6" ry="12" stroke-width="1.5" opacity="0.4"/>
    <line x1="-12" y1="-24" x2="12" y2="-24" stroke-width="1.5" opacity="0.4"/>
    <path d="M-10 -30 C-4 -28 4 -28 10 -30" stroke-width="1" opacity="0.3"/>
    <path d="M-10 -18 C-4 -20 4 -20 10 -18" stroke-width="1" opacity="0.3"/>
    <!-- Graduation cap on globe -->
    <path d="M0 -40 L-10 -34 L0 -28 L10 -34Z" fill="#ca8a04" opacity="0.2" stroke-width="1.5"/>
    <line x1="8" y1="-33" x2="8" y2="-26" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Sparkles -->
  <g fill="#ca8a04">
    <path d="M155 65 L157 61 L159 65 L157 69Z" opacity="0.25"/>
    <path d="M245 70 L247 66 L249 70 L247 74Z" opacity="0.2"/>
    <circle cx="150" cy="125" r="1.5" opacity="0.15"/>
    <circle cx="250" cy="120" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#713f12">Other Subjects</text>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ca8a04">On Request</text>
</svg>
