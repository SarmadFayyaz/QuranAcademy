<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="200" cy="100" r="55" fill="#ca8a04" opacity="0.1"/>
  <circle cx="200" cy="100" r="40" fill="#ca8a04" opacity="0.15"/>
  <!-- Stack of books -->
  <g transform="translate(200,92)" fill="none" stroke="#ca8a04" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom book -->
    <rect x="-20" y="4" width="40" height="8" rx="1.5" fill="#ca8a04" opacity="0.15"/>
    <!-- Middle book -->
    <rect x="-18" y="-5" width="36" height="8" rx="1.5" fill="#ca8a04" opacity="0.12"/>
    <!-- Top book -->
    <rect x="-16" y="-14" width="32" height="8" rx="1.5" fill="#ca8a04" opacity="0.1"/>
    <!-- Graduation cap on top -->
    <path d="M0 -24 L-16 -16 L0 -8 L16 -16Z" fill="#ca8a04" opacity="0.25"/>
    <line x1="0" y1="-8" x2="0" y2="-2"/>
    <path d="M12 -14 L12 -6"/>
  </g>
  <!-- Sparkle -->
  <g fill="#ca8a04" opacity="0.3">
    <circle cx="162" cy="78" r="2"/>
    <circle cx="238" cy="82" r="2"/>
    <circle cx="168" cy="118" r="1.5"/>
    <circle cx="232" cy="116" r="1.5"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#713f12">Other Subjects</text>
  <text x="200" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#ca8a04">On Request</text>
</svg>