<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgTF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgTF)"/>
  <circle cx="55" cy="40" r="25" fill="#ca8a04" opacity="0.05"/>
  <circle cx="345" cy="200" r="35" fill="#ca8a04" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#ca8a04" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#ca8a04" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#ca8a04" opacity="0.07"/>
  <!-- Open book -->
  <g transform="translate(192,95)" fill="none" stroke="#ca8a04" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-26 -20 C-26 -20 -4 -24 0 -16 C4 -24 26 -20 26 -20 L26 18 C26 18 4 14 0 20 C-4 14 -26 18 -26 18Z" stroke-width="2.5" fill="white" opacity="0.4"/>
    <line x1="0" y1="-16" x2="0" y2="20" stroke-width="1.5" opacity="0.4"/>
    <!-- Text lines -->
    <line x1="-20" y1="-10" x2="-5" y2="-12" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="-3" x2="-5" y2="-5" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="4" x2="-5" y2="2" stroke-width="1.5" opacity="0.35"/>
    <line x1="5" y1="-12" x2="20" y2="-10" stroke-width="1.5" opacity="0.4"/>
    <line x1="5" y1="-5" x2="20" y2="-3" stroke-width="1.5" opacity="0.4"/>
    <line x1="5" y1="2" x2="20" y2="4" stroke-width="1.5" opacity="0.35"/>
  </g>
  <!-- Magnifying glass over book -->
  <g transform="translate(222,78)" fill="none" stroke="#ca8a04" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="14" stroke-width="2.5" fill="white" opacity="0.3"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke-width="3"/>
    <!-- Lens glare -->
    <path d="M-6 -8 C-3 -10 3 -10 6 -8" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Light rays from magnifier -->
  <g stroke="#ca8a04" stroke-width="1" opacity="0.15" stroke-linecap="round">
    <line x1="208" y1="65" x2="205" y2="58"/>
    <line x1="215" y1="62" x2="215" y2="55"/>
    <line x1="224" y1="62" x2="228" y2="55"/>
  </g>
  <g fill="#ca8a04">
    <circle cx="152" cy="68" r="1.5" opacity="0.2"/>
    <circle cx="255" cy="125" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#713f12">Learn Tafsir</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ca8a04">Online</text>
</svg>
