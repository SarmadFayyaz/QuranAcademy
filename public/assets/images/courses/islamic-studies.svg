<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgIS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgIS)"/>
  <circle cx="55" cy="42" r="22" fill="#0d9488" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#0d9488" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#0d9488" opacity="0.08"/>
  <circle cx="200" cy="95" r="48" fill="#0d9488" opacity="0.10"/>
  <circle cx="200" cy="95" r="34" fill="#0d9488" opacity="0.08"/>
  <!-- Mosque dome -->
  <g transform="translate(200,95)" fill="none" stroke="#0d9488" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main dome -->
    <path d="M-24 10 C-24 -8 -16 -22 0 -26 C16 -22 24 -8 24 10" stroke-width="2.5" fill="white" opacity="0.4"/>
    <!-- Base -->
    <rect x="-28" y="10" width="56" height="12" rx="2" stroke-width="2" fill="white" opacity="0.3"/>
    <!-- Dome window -->
    <path d="M-8 4 C-8 -4 8 -4 8 4" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="4" x2="0" y2="-2" stroke-width="1.5" opacity="0.3"/>
    <!-- Crescent on top -->
    <circle cx="0" cy="-30" r="5" stroke-width="2" opacity="0.7"/>
    <circle cx="2" cy="-30" r="3.5" fill="url(#bgIS)" stroke="none"/>
    <!-- Minaret left -->
    <rect x="-34" y="-8" width="6" height="30" rx="1" stroke-width="1.5" opacity="0.4" fill="white"/>
    <path d="M-34 -8 C-34 -14 -28 -14 -28 -8" stroke-width="1.5" opacity="0.4"/>
    <!-- Minaret right -->
    <rect x="28" y="-8" width="6" height="30" rx="1" stroke-width="1.5" opacity="0.4" fill="white"/>
    <path d="M28 -8 C28 -14 34 -14 34 -8" stroke-width="1.5" opacity="0.4"/>
    <!-- Pillars -->
    <line x1="-16" y1="10" x2="-16" y2="22" stroke-width="1.5" opacity="0.3"/>
    <line x1="16" y1="10" x2="16" y2="22" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Stars -->
  <g fill="#0d9488">
    <path d="M155 65 L157 60 L159 65 L157 70Z" opacity="0.25"/>
    <path d="M245 60 L247 55 L249 60 L247 65Z" opacity="0.2"/>
    <circle cx="150" cy="120" r="1.5" opacity="0.15"/>
    <circle cx="250" cy="118" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#134e4a">Islamic Studies</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0d9488">Online</text>
</svg>
