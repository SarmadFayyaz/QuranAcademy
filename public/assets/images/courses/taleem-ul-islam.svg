<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgTI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgTI)"/>
  <circle cx="55" cy="42" r="22" fill="#7c3aed" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#7c3aed" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#7c3aed" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#7c3aed" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#7c3aed" opacity="0.07"/>
  <!-- Book on Rehal (book stand) -->
  <g transform="translate(200,92)" fill="none" stroke="#7c3aed" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rehal (X-shaped stand) -->
    <line x1="-18" y1="26" x2="-6" y2="12" stroke-width="2.5" opacity="0.5"/>
    <line x1="18" y1="26" x2="6" y2="12" stroke-width="2.5" opacity="0.5"/>
    <line x1="-14" y1="26" x2="6" y2="12" stroke-width="2" opacity="0.3"/>
    <line x1="14" y1="26" x2="-6" y2="12" stroke-width="2" opacity="0.3"/>
    <!-- Open book on stand -->
    <path d="M-28 -16 C-28 -16 -4 -20 0 -12 C4 -20 28 -16 28 -16 L28 12 C28 12 4 8 0 14 C-4 8 -28 12 -28 12Z" stroke-width="2.5" fill="white" opacity="0.4"/>
    <!-- Spine -->
    <line x1="0" y1="-12" x2="0" y2="14" stroke-width="1.5" opacity="0.4"/>
    <!-- Page lines left -->
    <line x1="-20" y1="-8" x2="-5" y2="-10" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="-2" x2="-5" y2="-4" stroke-width="1.5" opacity="0.35"/>
    <line x1="-20" y1="4" x2="-10" y2="3" stroke-width="1.5" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="5" y1="-10" x2="20" y2="-8" stroke-width="1.5" opacity="0.4"/>
    <line x1="5" y1="-4" x2="20" y2="-2" stroke-width="1.5" opacity="0.35"/>
    <line x1="5" y1="2" x2="14" y2="3" stroke-width="1.5" opacity="0.3"/>
    <!-- Bookmark ribbon -->
    <path d="M12 -16 L12 -24 L16 -20 L20 -24 L20 -16" stroke-width="1.5" fill="#7c3aed" opacity="0.2"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#7c3aed">
    <circle cx="150" cy="68" r="2" opacity="0.2"/>
    <circle cx="250" cy="72" r="1.5" opacity="0.15"/>
    <circle cx="155" cy="125" r="1.5" opacity="0.15"/>
    <circle cx="248" cy="120" r="2" opacity="0.2"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#4c1d95">Taleem ul Islam</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7c3aed">Foundation Course</text>
</svg>
