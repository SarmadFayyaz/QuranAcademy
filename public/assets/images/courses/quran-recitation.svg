<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgQR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
    <linearGradient id="bookQR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgQR)" rx="0"/>
  <!-- Decorative pattern -->
  <circle cx="60" cy="40" r="30" fill="#0d9488" opacity="0.04"/>
  <circle cx="340" cy="200" r="40" fill="#0d9488" opacity="0.04"/>
  <circle cx="350" cy="50" r="20" fill="#0d9488" opacity="0.05"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#0d9488" opacity="0.08"/>
  <circle cx="200" cy="95" r="48" fill="#0d9488" opacity="0.10"/>
  <circle cx="200" cy="95" r="34" fill="#0d9488" opacity="0.08"/>
  <!-- Open Quran book -->
  <g transform="translate(200,92)" fill="none" stroke="#0d9488" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book covers -->
    <path d="M-30 -22 C-30 -22 -4 -27 0 -18 C4 -27 30 -22 30 -22 L30 20 C30 20 4 15 0 22 C-4 15 -30 20 -30 20Z" stroke-width="2.5" fill="white" opacity="0.5"/>
    <!-- Spine -->
    <line x1="0" y1="-18" x2="0" y2="22" stroke-width="2"/>
    <!-- Left page text lines -->
    <line x1="-22" y1="-12" x2="-6" y2="-15" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="-5" x2="-6" y2="-8" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="2" x2="-6" y2="-1" stroke-width="1.5" opacity="0.5"/>
    <line x1="-22" y1="9" x2="-12" y2="7" stroke-width="1.5" opacity="0.4"/>
    <!-- Right page text lines -->
    <line x1="6" y1="-15" x2="22" y2="-12" stroke-width="1.5" opacity="0.5"/>
    <line x1="6" y1="-8" x2="22" y2="-5" stroke-width="1.5" opacity="0.5"/>
    <line x1="6" y1="-1" x2="22" y2="2" stroke-width="1.5" opacity="0.5"/>
    <line x1="6" y1="6" x2="16" y2="8" stroke-width="1.5" opacity="0.4"/>
    <!-- Ornate top decoration -->
    <path d="M-8 -30 C-4 -34 4 -34 8 -30" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="-35" r="2" fill="#0d9488" opacity="0.3"/>
  </g>
  <!-- Sound waves -->
  <g transform="translate(200,85)" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round">
    <path d="M38 -10 C43 -5 43 5 38 10" opacity="0.4"/>
    <path d="M44 -16 C52 -8 52 8 44 16" opacity="0.3"/>
    <path d="M50 -22 C60 -11 60 11 50 22" opacity="0.2"/>
  </g>
  <!-- Sparkle decorations -->
  <g fill="#0d9488">
    <circle cx="145" cy="60" r="2" opacity="0.3"/>
    <circle cx="255" cy="55" r="1.5" opacity="0.25"/>
    <circle cx="140" cy="130" r="1.5" opacity="0.2"/>
    <circle cx="260" cy="125" r="2" opacity="0.25"/>
  </g>
  <text x="200" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#134e4a">Quran Recitation</text>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0d9488">with Tajweed</text>
</svg>
