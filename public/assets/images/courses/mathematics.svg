<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgMA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgMA)"/>
  <circle cx="55" cy="42" r="22" fill="#3b82f6" opacity="0.04"/>
  <circle cx="345" cy="198" r="30" fill="#3b82f6" opacity="0.04"/>
  <!-- Main circle bg -->
  <circle cx="200" cy="95" r="62" fill="#3b82f6" opacity="0.07"/>
  <circle cx="200" cy="95" r="48" fill="#3b82f6" opacity="0.09"/>
  <circle cx="200" cy="95" r="34" fill="#3b82f6" opacity="0.07"/>
  <!-- Calculator -->
  <g transform="translate(200,92)" fill="none" stroke="#3b82f6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Calculator body -->
    <rect x="-22" y="-28" width="44" height="56" rx="5" stroke-width="2.5" fill="white" opacity="0.4"/>
    <!-- Screen -->
    <rect x="-16" y="-22" width="32" height="14" rx="3" stroke-width="1.5" fill="#3b82f6" opacity="0.1"/>
    <!-- Screen text -->
    <text x="12" y="-12" text-anchor="end" font-family="system-ui,monospace" font-size="10" fill="#3b82f6" font-weight="700" opacity="0.5">42</text>
    <!-- Button grid -->
    <rect x="-14" y="-4" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.15" stroke-width="1"/>
    <rect x="-4" y="-4" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.15" stroke-width="1"/>
    <rect x="6" y="-4" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.15" stroke-width="1"/>
    <rect x="-14" y="6" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.12" stroke-width="1"/>
    <rect x="-4" y="6" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.12" stroke-width="1"/>
    <rect x="6" y="6" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.12" stroke-width="1"/>
    <rect x="-14" y="16" width="8" height="6" rx="1.5" fill="#3b82f6" opacity="0.1" stroke-width="1"/>
    <rect x="-4" y="16" width="18" height="6" rx="1.5" fill="#3b82f6" opacity="0.2" stroke-width="1"/>
  </g>
  <!-- Floating math symbols -->
  <g font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#3b82f6">
    <text x="150" y="75" opacity="0.25">+</text>
    <text x="242" y="80" opacity="0.2">÷</text>
    <text x="155" y="125" opacity="0.2">×</text>
    <text x="238" y="118" opacity="0.22">π</text>
  </g>
  <!-- Ruler accent -->
  <g transform="translate(160,60) rotate(-20)" stroke="#3b82f6" stroke-width="1" opacity="0.15">
    <rect x="0" y="0" width="30" height="6" rx="1"/>
    <line x1="5" y1="0" x2="5" y2="3"/>
    <line x1="10" y1="0" x2="10" y2="4"/>
    <line x1="15" y1="0" x2="15" y2="3"/>
    <line x1="20" y1="0" x2="20" y2="4"/>
    <line x1="25" y1="0" x2="25" y2="3"/>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1e3a5f">Mathematics</text>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3b82f6">All Levels</text>
</svg>
