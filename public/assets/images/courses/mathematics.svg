<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <circle cx="200" cy="100" r="55" fill="#3b82f6" opacity="0.1"/>
  <circle cx="200" cy="100" r="40" fill="#3b82f6" opacity="0.15"/>
  <!-- Calculator / Math symbols -->
  <g transform="translate(200,95)" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-18" y="-22" width="36" height="44" rx="4"/>
    <rect x="-13" y="-17" width="26" height="10" rx="2" fill="#3b82f6" opacity="0.15"/>
    <!-- Buttons -->
    <circle cx="-8" cy="2" r="2.5" fill="#3b82f6" opacity="0.3"/>
    <circle cx="0" cy="2" r="2.5" fill="#3b82f6" opacity="0.3"/>
    <circle cx="8" cy="2" r="2.5" fill="#3b82f6" opacity="0.3"/>
    <circle cx="-8" cy="12" r="2.5" fill="#3b82f6" opacity="0.3"/>
    <circle cx="0" cy="12" r="2.5" fill="#3b82f6" opacity="0.3"/>
    <circle cx="8" cy="12" r="2.5" fill="#3b82f6" opacity="0.3"/>
  </g>
  <!-- Math symbols floating -->
  <g font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#3b82f6" opacity="0.3">
    <text x="155" y="80">+</text>
    <text x="237" y="85">÷</text>
    <text x="160" y="125">×</text>
    <text x="232" y="120">−</text>
  </g>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1e3a5f">Mathematics</text>
  <text x="200" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#3b82f6">All Levels</text>
</svg>